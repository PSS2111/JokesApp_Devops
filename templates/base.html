<!DOCTYPE html>
<html>
<head>
    <title>Joke App</title>

    <style>
        html, body {
            height: 100%;
            margin: 0;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #667eea, #764ba2);
            background-attachment: fixed;
            color: white;
        }

        /* NAVBAR */
        .navbar {
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        /* MAIN CONTENT (FIXED LAYOUT) */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* REMOVE OLD CONTAINER HEIGHT ISSUE */
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* CARD */
        .card {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 20px;
            width: 420px;
            text-align: center;
            backdrop-filter: blur(12px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .emoji {
            font-size: 50px;
            margin-bottom: 10px;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            background: #ff7b00;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff5500;
            transform: scale(1.05);
        }

        h2 {
            margin-bottom: 10px;
        }

        /* FOOTER (FIXED) */
        .footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(8px);
        }

        .footer a {
            color: white;
            text-decoration: none;
            margin: 0 5px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

    </style>

</head>
<body>

<div class="navbar">
    <div><b>😂 JokeApp</b></div>
    <div class="nav-links">
        <a href="/">Home</a>
        <a href="/about">About</a>
    </div>
</div>

<!-- FIXED MAIN WRAPPER -->
<main class="main-content">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    <p> JokeApp | DevOps Demo Project</p>
    <p>Made using • Flask • Docker • Render</p>
</footer>

</body>
</html>
